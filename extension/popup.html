<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<style>
  body { width: 320px; font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1320; color: #f1f5f9; padding: 14px; margin: 0; font-size: 13px; }
  h1 { font-size: 14px; margin: 0 0 12px; color: #fff; display: flex; align-items: center; gap: 8px; }
  .logo { width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, #a5b4fc, #c4b5fd); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #06291a; }
  label { display: block; color: #cbd5e1; margin: 10px 0 4px; font-size: 12px; font-weight: 500; }
  input { width: 100%; box-sizing: border-box; background: #161b2c; border: 1px solid #353c5c; border-radius: 6px; padding: 7px 10px; color: #fff; font-size: 12px; font-family: inherit; }
  input:focus { outline: none; border-color: #a5b4fc; }
  button { width: 100%; background: linear-gradient(135deg, #a5b4fc, #c4b5fd); color: #06291a; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 12px; }
  button:hover { opacity: 0.9; }
  .status { background: #161b2c; border: 1px solid #232842; border-radius: 6px; padding: 10px; margin-top: 12px; font-size: 11px; color: #cbd5e1; }
  .status .ok { color: #6ee7a7; font-weight: 600; }
  .status .err { color: #fca5a5; font-weight: 600; }
  .hint { font-size: 11px; color: #94a3b8; margin-top: 8px; line-height: 1.5; }
  .row { font-size: 11px; margin: 3px 0; word-break: break-all; }
  .muted { color: #94a3b8; }
</style>
</head>
<body>
  <h1><span class="logo">FS</span> FullSell Connector</h1>

  <label>FullSell URL</label>
  <input id="base" placeholder="https://fullsell.onrender.com">

  <label>Connector Secret</label>
  <input id="secret" type="password" placeholder="Секрет из настроек FullSell">

  <button id="save">Сохранить</button>

  <div class="status" id="status">Загружаю статус...</div>

  <div class="hint">
    Откройте кабинет UZUM Seller и зайдите в раздел «Продвижение». Расширение перехватит токен и отправит в FullSell автоматически.
  </div>

  <script src="popup.js"></script>
</body>
</html>
