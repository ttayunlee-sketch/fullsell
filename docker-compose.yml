services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fullsell:${POSTGRES_PASSWORD}@db:5432/fullsell
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CONNECTOR_SECRET: ${CONNECTOR_SECRET}
    expose:
      - "8000"
    volumes:
      - market_data:/app/market_data
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fullsell
      POSTGRES_USER: fullsell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullsell -d fullsell"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  market_data:
