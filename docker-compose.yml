services:
  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fullsell:${POSTGRES_PASSWORD}@db:5432/fullsell
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CONNECTOR_SECRET: ${CONNECTOR_SECRET}
      IG_VERIFY_TOKEN:  ${IG_VERIFY_TOKEN:-}
      IG_APP_SECRET:    ${IG_APP_SECRET:-}
      IG_ACCESS_TOKEN:  ${IG_ACCESS_TOKEN:-}
      IG_BUSINESS_ID:   ${IG_BUSINESS_ID:-}
    expose:
      - "8000"
    volumes:
      - market_data:/app/market_data
      - scraper_state:/state
    depends_on:
      db:
        condition: service_healthy

  scraper:
    build: ./scraper
    profiles: ["scrape"]   # не стартует автоматически; запускается через `docker compose run --rm scraper`
    environment:
      DATABASE_URL: postgresql://fullsell:${POSTGRES_PASSWORD}@db:5432/fullsell
      TWOCAPTCHA_API_KEY: ${TWOCAPTCHA_API_KEY:-}
      ZENROWS_API_KEY:   ${ZENROWS_API_KEY:-}
      ZENROWS_PREMIUM:   ${ZENROWS_PREMIUM:-}
      UZUM_PROXY:        ${UZUM_PROXY:-}
      SCRAPER_TOP_CATS: "50"
      SCRAPER_PRODUCTS_PER_CAT: "200"
      SCRAPER_SCROLLS: "8"
    volumes:
      - scraper_state:/state
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fullsell
      POSTGRES_USER: fullsell
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Открываем 5432 наружу — нужно для Tashkent VPS scraper.
    # Доступ ограничен Lightsail firewall whitelist (138.249.248.45/32).
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fullsell -d fullsell"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  market_data:
  scraper_state:
