<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}FullSell{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root { --bg: #0f1117; --card: #1a1d27; --border: #252836; --muted: #64748b; --sub: #94a3b8; }
  body { background: var(--bg); color: #e2e8f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
  .sidebar { background: var(--card); width: 230px; min-height: 100vh; position: fixed; left: 0; top: 0; padding: 24px 14px; border-right: 1px solid var(--border); }
  .main { margin-left: 230px; padding: 32px; }
  .logo { font-size: 1.3rem; font-weight: 700; color: #fff; margin-bottom: 28px; padding: 0 6px; }
  .logo .accent { background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .nav-link { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: 8px; color: var(--sub); text-decoration: none; margin-bottom: 2px; transition: all .15s; font-size: .9rem; }
  .nav-link:hover, .nav-link.active { background: var(--border); color: #fff; }
  .card-dark { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-val { font-size: 1.9rem; font-weight: 700; color: #fff; line-height: 1.1; }
  .stat-lbl { color: var(--muted); font-size: .82rem; margin-top: 4px; }
  .page-title { font-size: 1.35rem; font-weight: 700; color: #fff; }
  .page-sub { color: var(--muted); font-size: .88rem; margin-bottom: 24px; margin-top: 2px; }
  .btn-primary { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: 8px; }
  .btn-primary:hover { opacity: .88; background: linear-gradient(135deg,#6366f1,#8b5cf6); }
  .badge-ok   { background: rgba(34,197,94,.12); color: #22c55e; padding: 3px 10px; border-radius: 20px; font-size: .77rem; white-space: nowrap; }
  .badge-warn { background: rgba(234,179,8,.12); color: #eab308; padding: 3px 10px; border-radius: 20px; font-size: .77rem; white-space: nowrap; }
  .badge-off  { background: rgba(100,116,139,.12); color: var(--sub); padding: 3px 10px; border-radius: 20px; font-size: .77rem; white-space: nowrap; }
  .alert-row { border-left: 3px solid #6366f1; background: var(--card); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-bottom: 8px; }
  .alert-row.up   { border-left-color: #22c55e; }
  .alert-row.down { border-left-color: #ef4444; }
  .alert-row.warn { border-left-color: #eab308; }
  .alert-time { font-size: .78rem; color: var(--muted); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; box-shadow: 0 0 6px #22c55e88; }
  table thead th { background: var(--border); color: var(--sub); font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; border: none; padding: 11px 14px; }
  table tbody td { background: var(--card); border-color: var(--border); padding: 11px 14px; vertical-align: middle; color: var(--sub); }
  table tbody tr:hover td { background: #21253300; }
  .rank-a { color: #22c55e; font-weight: 700; }
  .rank-b { color: #3b82f6; font-weight: 700; }
  .rank-c { color: #f59e0b; font-weight: 700; }
  .rank-d { color: var(--muted); font-weight: 700; }
  .product-name { color: #e2e8f0 !important; font-weight: 500; max-width: 220px; }
  canvas { max-height: 200px; }
  .footer-status { position: absolute; bottom: 20px; left: 14px; right: 14px; background: var(--border); border-radius: 8px; padding: 10px 12px; font-size: .8rem; color: var(--muted); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="logo">FS <span class="accent">FullSell</span></div>
  <nav>
    <a href="/clients" class="nav-link {% if active_page=='clients' %}active{% endif %}">🏪 Клиенты</a>
    {% if client_id %}
    <a href="/shop/{{ client_id }}" class="nav-link {% if active_page=='shop' %}active{% endif %}">📦 Магазин</a>
    {% endif %}
    <a href="/logout" class="nav-link" style="margin-top:auto;">🚪 Выйти</a>
  </nav>
  <div class="footer-status">
    <span class="status-dot"></span>Система активна
  </div>
</div>

<div class="main">
  {% block content %}{% endblock %}
</div>
</body>
</html>
