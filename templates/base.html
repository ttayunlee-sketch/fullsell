<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}FullSell{% endblock %}</title>

<!-- Inline SVG favicon (FS gradient mark) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23818cf8'/%3E%3Cstop offset='.5' stop-color='%23a78bfa'/%3E%3Cstop offset='1' stop-color='%23c084fc'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='50%25' y='52%25' dominant-baseline='middle' text-anchor='middle' font-family='Inter,sans-serif' font-weight='800' font-size='28' fill='white'%3EFS%3C/text%3E%3C/svg%3E"/>

<!-- Inter font (premium SaaS look) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- Bootstrap (для grid и modal) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    /* ── Premium dark palette ── */
    --bg: #07080f;
    --bg-2: #0a0c16;
    --surface: #0f1220;
    --surface-2: #151828;
    --surface-3: #1c2034;
    --border: rgba(255,255,255,.06);
    --border-strong: rgba(255,255,255,.12);

    --text: #f5f7fa;
    --text-2: #c8cfdc;
    --muted: #8b93a7;
    --dim: #5a6275;

    /* Accents — premium indigo + violet */
    --primary: #818cf8;
    --primary-2: #a78bfa;
    --primary-3: #c084fc;
    --primary-glow: rgba(129,140,248,.4);

    --cyan: #22d3ee;
    --green: #4ade80;
    --green-glow: rgba(74,222,128,.4);
    --amber: #fbbf24;
    --rose: #fb7185;
    --rose-glow: rgba(251,113,133,.4);

    /* Gradients */
    --grad-primary: linear-gradient(135deg, #818cf8 0%, #a78bfa 50%, #c084fc 100%);
    --grad-success: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
    --grad-warn:    linear-gradient(135deg, #fbbf24 0%, #f97316 100%);
    --grad-danger:  linear-gradient(135deg, #fb7185 0%, #ef4444 100%);
    --grad-cyan:    linear-gradient(135deg, #22d3ee 0%, #818cf8 100%);

    /* Shadows (multi-layer for depth) */
    --shadow-sm: 0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.05);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
    --shadow-glow: 0 0 40px rgba(129,140,248,.18);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    font-feature-settings: 'cv02','cv03','cv04','cv11';
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated gradient blobs background */
  body::before {
    content: '';
    position: fixed; inset: -20%;
    background:
      radial-gradient(ellipse 50% 40% at 20% 20%, rgba(129,140,248,.18), transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 30%, rgba(192,132,252,.12), transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 80%, rgba(34,211,238,.08), transparent 60%);
    filter: blur(40px);
    animation: drift 24s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) rotate(0deg); }
    50%  { transform: translate(40px, -30px) rotate(3deg); }
    100% { transform: translate(-30px, 40px) rotate(-3deg); }
  }

  /* Subtle dotted texture */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events: none;
    z-index: 0;
  }

  code, .mono { font-family: 'JetBrains Mono', monospace; }

  /* ─────────────────── SIDEBAR ─────────────────── */
  .sidebar {
    background: linear-gradient(180deg, rgba(15,18,32,.95), rgba(7,8,15,.95));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    width: 248px; min-height: 100vh;
    position: fixed; left: 0; top: 0;
    padding: 24px 16px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 10;
  }

  .logo {
    display: flex; align-items: center; gap: 12px;
    padding: 4px 8px 24px;
    margin-bottom: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--grad-primary);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 14px;
    box-shadow: 0 4px 16px rgba(129,140,248,.4), inset 0 1px 0 rgba(255,255,255,.2);
    letter-spacing: -.02em;
  }
  .logo-text {
    font-size: 1.1rem; font-weight: 700; color: #fff;
    letter-spacing: -.02em; line-height: 1.1;
  }
  .logo-text small {
    display: block; font-size: .68rem; font-weight: 500;
    color: var(--muted); letter-spacing: .06em; text-transform: uppercase;
    margin-top: 2px;
  }

  .nav-section {
    font-size: .68rem; text-transform: uppercase;
    letter-spacing: .1em; color: var(--dim);
    padding: 18px 12px 8px; font-weight: 600;
  }

  .nav-link {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 12px; border-radius: 10px;
    color: var(--text-2); text-decoration: none;
    margin-bottom: 2px; font-size: .9rem; font-weight: 500;
    transition: all .18s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .nav-link:hover {
    background: rgba(255,255,255,.04);
    color: #fff;
  }
  .nav-link.active {
    background: linear-gradient(90deg, rgba(129,140,248,.16), rgba(167,139,250,.08));
    color: #fff; font-weight: 600;
    box-shadow: inset 0 0 0 1px rgba(129,140,248,.2);
  }
  .nav-link.active::before {
    content: ''; position: absolute; left: -16px; top: 8px; bottom: 8px; width: 3px;
    background: var(--grad-primary); border-radius: 0 3px 3px 0;
    box-shadow: 0 0 12px var(--primary-glow);
  }
  .nav-link svg { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 2; }

  .sidebar-bottom {
    margin-top: auto; padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    background: rgba(74,222,128,.08);
    border: 1px solid rgba(74,222,128,.2);
    border-radius: 100px; padding: 8px 14px;
    font-size: .78rem; color: #86efac; font-weight: 500;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green-glow);
    animation: pulse-dot 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse-dot {
    0%   { box-shadow: 0 0 0 0 rgba(74,222,128,.6); }
    70%  { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }

  /* ─────────────────── MAIN ─────────────────── */
  .main {
    margin-left: 248px;
    padding: 32px 40px 60px;
    max-width: 1480px;
    position: relative;
    z-index: 1;
  }

  .page-header { margin-bottom: 28px; }
  .page-title {
    font-size: 1.7rem; font-weight: 700; color: #fff;
    letter-spacing: -.025em; line-height: 1.15;
  }
  .page-title-grad {
    background: linear-gradient(135deg, #fff 0%, #c7d2fe 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .page-sub { color: var(--muted); font-size: .9rem; margin-top: 5px; }

  /* ─────────────────── CARDS (glassmorphism) ─────────────────── */
  .card-dark {
    background: linear-gradient(180deg, rgba(21,24,40,.6), rgba(15,18,32,.4));
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
    box-shadow: var(--shadow-sm);
    transition: all .25s cubic-bezier(.4,0,.2,1);
  }
  .card-dark:hover {
    border-color: var(--border-strong);
    box-shadow: var(--shadow-md);
  }

  /* ─────────────────── STAT CARDS (premium) ─────────────────── */
  .stat {
    background: linear-gradient(180deg, rgba(28,32,52,.6), rgba(15,18,32,.5));
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 22px;
    position: relative; overflow: hidden;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    box-shadow: var(--shadow-sm);
  }
  .stat::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 80% at 0% 0%, rgba(129,140,248,.06), transparent 60%);
    opacity: .8;
    transition: opacity .3s;
  }
  .stat:hover {
    border-color: var(--border-strong);
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }
  .stat:hover::before { opacity: 1; }
  .stat-accent {
    height: 2px; border-radius: 0 0 2px 2px;
    position: absolute; top: 0; left: 16px; right: 16px;
  }
  .stat-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 38px; height: 38px; border-radius: 10px;
    background: rgba(129,140,248,.1);
    border: 1px solid rgba(129,140,248,.2);
    margin-bottom: 14px; font-size: 1.05rem;
  }
  .stat-val {
    font-size: 1.95rem; font-weight: 700; color: #fff;
    line-height: 1; letter-spacing: -.035em;
    font-feature-settings: 'tnum';
  }
  .stat-lbl {
    color: var(--text-2); font-size: .82rem;
    margin-top: 8px; font-weight: 500;
  }

  /* ─────────────────── BUTTONS ─────────────────── */
  .btn-primary, .btn.btn-primary {
    background: var(--grad-primary) !important;
    border: 1px solid rgba(255,255,255,.1) !important;
    border-radius: 10px;
    font-weight: 600; color: #fff !important;
    padding: 9px 18px;
    box-shadow:
      0 4px 14px rgba(129,140,248,.35),
      inset 0 1px 0 rgba(255,255,255,.2);
    transition: all .18s cubic-bezier(.4,0,.2,1);
    letter-spacing: -.005em;
  }
  .btn-primary:hover, .btn.btn-primary:hover {
    transform: translateY(-1px);
    box-shadow:
      0 6px 24px rgba(129,140,248,.5),
      inset 0 1px 0 rgba(255,255,255,.25);
  }
  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-2); font-size: .85rem; font-weight: 500;
    padding: 8px 14px;
    transition: all .15s;
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,.08);
    color: #fff; border-color: var(--border-strong);
  }

  .btn-sm { padding: 6px 14px !important; font-size: .82rem !important; }

  /* ─────────────────── BADGES ─────────────────── */
  .badge-ok {
    background: rgba(74,222,128,.12); color: #86efac;
    border: 1px solid rgba(74,222,128,.25);
    padding: 4px 11px; border-radius: 100px;
    font-size: .74rem; font-weight: 600; white-space: nowrap;
    letter-spacing: -.005em;
  }
  .badge-warn {
    background: rgba(251,191,36,.12); color: #fcd34d;
    border: 1px solid rgba(251,191,36,.25);
    padding: 4px 11px; border-radius: 100px;
    font-size: .74rem; font-weight: 600; white-space: nowrap;
  }
  .badge-off {
    background: rgba(148,163,184,.08); color: var(--text-2);
    border: 1px solid var(--border);
    padding: 4px 11px; border-radius: 100px;
    font-size: .74rem; font-weight: 500; white-space: nowrap;
  }

  /* ─────────────────── TABLES ─────────────────── */
  .table-wrap {
    background: linear-gradient(180deg, rgba(21,24,40,.6), rgba(15,18,32,.5));
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .fs-table, .table-wrap .table {
    --bs-table-bg: transparent !important;
    --bs-table-color: #fff !important;
    --bs-table-color-state: #fff !important;
    --bs-table-bg-state: transparent !important;
    --bs-table-striped-bg: transparent !important;
    --bs-table-striped-color: #fff !important;
    --bs-table-hover-bg: rgba(129,140,248,.06) !important;
    --bs-table-hover-color: #fff !important;
    --bs-table-border-color: var(--border) !important;
    background: transparent !important;
    color: #fff !important;
    margin: 0;
  }
  .fs-table thead th, .table-wrap thead th {
    background: rgba(28,32,52,.5) !important;
    color: var(--muted) !important;
    font-size: .72rem;
    text-transform: uppercase; letter-spacing: .08em;
    font-weight: 600;
    border-bottom: 1px solid var(--border) !important;
    border-top: none !important;
    padding: 14px 16px; white-space: nowrap;
  }
  .fs-table tbody td, .table-wrap tbody td {
    background: transparent !important;
    border-color: var(--border) !important;
    padding: 13px 16px; vertical-align: middle;
    color: #fff !important; font-size: .88rem; font-weight: 400;
  }
  .fs-table tbody tr, .table-wrap tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .14s;
    background: transparent !important;
  }
  .fs-table tbody tr:last-child, .table-wrap tbody tr:last-child {
    border-bottom: none;
  }
  .fs-table tbody tr:hover td, .table-wrap tbody tr:hover td {
    background: rgba(129,140,248,.06) !important;
  }
  .product-name { color: #fff !important; font-weight: 600; }

  /* ─────────────────── RANKS ─────────────────── */
  .rank-a, .rank-b, .rank-c, .rank-d {
    font-weight: 700; padding: 3px 10px;
    border-radius: 8px; font-size: .8rem;
    font-feature-settings: 'tnum';
  }
  .rank-a { color: #6ee7a7; background: rgba(110,231,167,.13); border: 1px solid rgba(110,231,167,.2); }
  .rank-b { color: #93c5fd; background: rgba(147,197,253,.13); border: 1px solid rgba(147,197,253,.2); }
  .rank-c { color: #fcd34d; background: rgba(252,211,77,.13);  border: 1px solid rgba(252,211,77,.2); }
  .rank-d { color: var(--muted); background: rgba(255,255,255,.04); border: 1px solid var(--border); }

  /* ─────────────────── ALERTS ─────────────────── */
  .alert-row {
    border-left: 3px solid var(--primary);
    background: linear-gradient(90deg, rgba(129,140,248,.06), rgba(15,18,32,.5));
    border-radius: 0 12px 12px 0;
    padding: 12px 18px; margin-bottom: 8px;
    transition: all .15s;
  }
  .alert-row:hover { background: linear-gradient(90deg, rgba(129,140,248,.1), rgba(15,18,32,.5)); }
  .alert-row.up   { border-left-color: var(--green); background: linear-gradient(90deg, rgba(74,222,128,.06), rgba(15,18,32,.5)); }
  .alert-row.down { border-left-color: var(--rose); background: linear-gradient(90deg, rgba(251,113,133,.06), rgba(15,18,32,.5)); }
  .alert-row.warn { border-left-color: var(--amber); background: linear-gradient(90deg, rgba(251,191,36,.06), rgba(15,18,32,.5)); }
  .alert-time { font-size: .78rem; color: var(--muted); }

  /* ─────────────────── TABS ─────────────────── */
  .nav.fs-tabs, ul.nav { padding: 0; list-style: none; gap: 4px; }
  .tab-link {
    color: var(--muted); text-decoration: none;
    padding: 10px 16px; display: inline-flex; align-items: center; gap: 6px;
    border-bottom: 2px solid transparent;
    font-size: .9rem; font-weight: 500;
    transition: all .18s cubic-bezier(.4,0,.2,1);
    position: relative;
  }
  .tab-link:hover { color: var(--text); }
  .tab-link.active {
    color: #fff; font-weight: 600;
  }
  .tab-link.active::after {
    content: ''; position: absolute; bottom: -1px; left: 12px; right: 12px; height: 2px;
    background: var(--grad-primary); border-radius: 2px 2px 0 0;
    box-shadow: 0 0 16px var(--primary-glow);
  }

  /* ─────────────────── PRODUCT IMAGES ─────────────────── */
  .product-img {
    width: 44px; height: 44px; border-radius: 10px;
    object-fit: cover; background: var(--surface-2);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  .product-img-placeholder {
    width: 44px; height: 44px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  /* ─────────────────── FORMS ─────────────────── */
  .form-control, input.form-control, select.form-control, textarea.form-control {
    background: rgba(15,18,32,.6) !important;
    border: 1px solid var(--border-strong) !important;
    color: #fff !important;
    border-radius: 10px;
    font-size: .9rem;
    padding: 9px 13px;
    font-family: inherit;
    transition: all .15s;
  }
  .form-control:focus {
    background: rgba(15,18,32,.8) !important;
    border-color: var(--primary) !important;
    color: #fff !important;
    box-shadow: 0 0 0 3px rgba(129,140,248,.18) !important;
    outline: none;
  }
  .form-control::placeholder { color: var(--dim); }

  /* ─────────────────── MODAL ─────────────────── */
  .modal-content {
    background: linear-gradient(180deg, rgba(15,18,32,.95), rgba(7,8,15,.95)) !important;
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-strong) !important;
    border-radius: 16px !important;
    box-shadow: 0 25px 80px rgba(0,0,0,.6);
  }
  .modal-header { border-color: var(--border) !important; }
  .modal-footer { border-color: var(--border) !important; }

  /* ─────────────────── CHARTS ─────────────────── */
  canvas { max-height: 240px; }

  /* ─────────────────── SCROLLBAR ─────────────────── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,.1);
    border-radius: 100px;
  }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.2); }

  /* ─────────────────── UTILITIES ─────────────────── */
  .grad-text {
    background: var(--grad-primary);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .glow-primary { box-shadow: var(--shadow-glow); }

  /* ─────────────────── SUMMARY (alerts) PILL ─────────────────── */
  .summary-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px; border-radius: 100px;
    font-size: .68rem; font-weight: 700; letter-spacing: -.005em;
    margin-left: 4px;
  }

  /* ─────────────────── ENTRANCE ANIMATIONS ─────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .main > * { animation: fadeUp .4s ease-out backwards; }
  .main > *:nth-child(2) { animation-delay: .05s; }
  .main > *:nth-child(3) { animation-delay: .1s; }
  .main > *:nth-child(4) { animation-delay: .15s; }

  /* ─────────────────── STAT VARIANTS (per-card themes) ─────────────────── */
  .stat-violet  { --c1: #818cf8; --c2: #a78bfa; --c3: #c084fc; }
  .stat-cyan    { --c1: #22d3ee; --c2: #818cf8; --c3: #a78bfa; }
  .stat-green   { --c1: #4ade80; --c2: #22d3ee; --c3: #818cf8; }
  .stat-amber   { --c1: #fbbf24; --c2: #f97316; --c3: #ef4444; }
  .stat-rose    { --c1: #fb7185; --c2: #f43f5e; --c3: #c084fc; }
  .stat-themed { position: relative; }
  .stat-themed::before {
    background: radial-gradient(120% 80% at 0% 0%,
      color-mix(in oklab, var(--c1, #818cf8) 12%, transparent),
      transparent 60%) !important;
  }
  .stat-themed:hover {
    border-color: color-mix(in oklab, var(--c1, #818cf8) 35%, transparent) !important;
    box-shadow:
      0 12px 40px rgba(0,0,0,.5),
      0 0 40px color-mix(in oklab, var(--c1, #818cf8) 25%, transparent),
      0 0 0 1px rgba(255,255,255,.08) !important;
  }
  .stat-themed .stat-icon {
    background: linear-gradient(135deg,
      color-mix(in oklab, var(--c1, #818cf8) 20%, transparent),
      color-mix(in oklab, var(--c2, #a78bfa) 20%, transparent)) !important;
    border-color: color-mix(in oklab, var(--c1, #818cf8) 35%, transparent) !important;
    color: var(--c1, #fff);
  }
  .stat-themed .stat-accent {
    background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3));
    box-shadow: 0 0 16px color-mix(in oklab, var(--c1, #818cf8) 50%, transparent);
  }
  .stat-themed .stat-val {
    background: linear-gradient(135deg, #fff 0%, color-mix(in oklab, var(--c2, #a78bfa) 50%, white) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ─────────────────── 3D TILT ─────────────────── */
  .tilt {
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    transform-style: preserve-3d;
    will-change: transform;
  }

  /* ─────────────────── DANGER BANNER (DRR alert) ─────────────────── */
  .danger-banner {
    background: linear-gradient(135deg, rgba(251,113,133,.15), rgba(239,68,68,.08));
    border: 1px solid rgba(251,113,133,.35);
    border-radius: 14px; padding: 16px 20px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 0 40px rgba(251,113,133,.15);
    margin-bottom: 16px;
    animation: pulse-danger 2.5s ease-in-out infinite;
  }
  @keyframes pulse-danger {
    50% { box-shadow: 0 0 60px rgba(251,113,133,.3); }
  }
  .danger-banner .banner-icon {
    width: 40px; height: 40px; border-radius: 12px;
    background: linear-gradient(135deg, #fb7185, #ef4444);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #fff;
    box-shadow: 0 4px 16px rgba(251,113,133,.4);
  }

  /* ─────────────────── TOAST ─────────────────── */
  .toast-stack {
    position: fixed; top: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 10000;
  }
  .toast {
    background: linear-gradient(180deg, rgba(28,32,52,.95), rgba(15,18,32,.95));
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-strong);
    border-radius: 12px;
    padding: 12px 16px;
    color: #fff; font-size: .88rem; font-weight: 500;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    display: flex; align-items: center; gap: 10px;
    min-width: 220px; max-width: 380px;
    animation: toast-in .3s cubic-bezier(.4,0,.2,1);
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--rose); }
  .toast.info    { border-left: 3px solid var(--primary); }
  @keyframes toast-in {
    from { transform: translateX(120%); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes toast-out {
    to { transform: translateX(120%); opacity: 0; }
  }

  /* ─────────────────── SKELETON ─────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--surface-3) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s ease-in-out infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }

  /* ─────────────────── RESPONSIVE ─────────────────── */
  @media (max-width: 768px) {
    .sidebar { width: 76px; padding: 16px 8px; }
    .sidebar .logo-text, .sidebar .nav-section, .sidebar .nav-link span:not(.nav-icon),
    .sidebar .status-pill { display: none; }
    .nav-link { justify-content: center; }
    .main { margin-left: 76px; padding: 20px 16px; }
  }
</style>
{% block head %}{% endblock %}
</head>
<body>
<aside class="sidebar">
  <div class="logo">
    <div class="logo-mark">FS</div>
    <div class="logo-text">FullSell<small>UZUM agency suite</small></div>
  </div>

  <nav>
    <div class="nav-section">Навигация</div>
    <a href="/clients" class="nav-link {% if active_page=='clients' %}active{% endif %}">
      <i data-lucide="store"></i><span>Клиенты</span>
    </a>
    {% if client_id %}
    <a href="/shop/{{ client_id }}" class="nav-link {% if active_page=='shop' %}active{% endif %}">
      <i data-lucide="layout-dashboard"></i><span>Магазин</span>
    </a>
    {% endif %}
    <a href="/market" class="nav-link {% if active_page=='market' %}active{% endif %}">
      <i data-lucide="bar-chart-3"></i><span>Рынок UZUM</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <a href="/logout" class="nav-link" style="margin-bottom:10px;">
      <i data-lucide="log-out"></i><span>Выйти</span>
    </a>
    <div class="status-pill">
      <span class="status-dot"></span><span>Система активна</span>
    </div>
  </div>
</aside>

<div class="toast-stack" id="toast-stack"></div>

<main class="main">
  {% block content %}{% endblock %}
</main>

<script>
  // ── Lucide icons ──
  if (window.lucide) lucide.createIcons();

  // ── Toast notifications ──
  window.toast = function(msg, type = 'info', timeout = 3500) {
    const stack = document.getElementById('toast-stack');
    if (!stack) return;
    const t = document.createElement('div');
    t.className = 'toast ' + type;
    const icon = type === 'success' ? 'check-circle' :
                 type === 'error'   ? 'alert-circle' : 'info';
    t.innerHTML = `<i data-lucide="${icon}" style="width:18px;height:18px;flex-shrink:0;color:${type==='success'?'#6ee7a7':type==='error'?'#fb7185':'#a5b4fc'};"></i><span>${msg}</span>`;
    stack.appendChild(t);
    if (window.lucide) lucide.createIcons();
    setTimeout(() => {
      t.style.animation = 'toast-out .3s forwards';
      setTimeout(() => t.remove(), 300);
    }, timeout);
  };

  // ── Animated number counters ──
  function animateCounters(root = document) {
    root.querySelectorAll('[data-count]').forEach(el => {
      if (el.dataset._animated) return;
      const target = parseFloat(el.dataset.count) || 0;
      const decimals = parseInt(el.dataset.decimals || '0');
      const duration = 800;
      const start = performance.now();
      const fmt = n => decimals
        ? n.toFixed(decimals)
        : Math.round(n).toLocaleString('ru-RU');
      const step = now => {
        const t = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3); // easeOutCubic
        el.textContent = fmt(target * eased);
        if (t < 1) requestAnimationFrame(step);
        else el.dataset._animated = '1';
      };
      requestAnimationFrame(step);
    });
  }
  document.addEventListener('DOMContentLoaded', () => animateCounters());
  setTimeout(() => animateCounters(), 100);

  // ── Tilt 3D effect on cards ──
  document.addEventListener('pointermove', e => {
    const card = e.target.closest('.tilt');
    if (!card) return;
    const r = card.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width  - 0.5) * 6;
    const y = ((e.clientY - r.top)  / r.height - 0.5) * -6;
    card.style.transform = `perspective(800px) rotateX(${y}deg) rotateY(${x}deg) translateZ(0)`;
  });
  document.addEventListener('pointerleave', () => {
    document.querySelectorAll('.tilt').forEach(c => c.style.transform = '');
  }, true);
  document.addEventListener('mouseleave', () => {
    document.querySelectorAll('.tilt').forEach(c => c.style.transform = '');
  });

  // Reset tilt when leaving
  document.querySelectorAll('.tilt').forEach(card => {
    card.addEventListener('mouseleave', () => card.style.transform = '');
  });
</script>
</body>
</html>
