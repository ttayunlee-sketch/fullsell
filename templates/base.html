<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}FullSell{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0a0d16;
    --card: #151926;
    --card2: #1c2030;
    --border: #262b3d;
    --border2: #353a52;
    --muted: #94a3b8;
    --sub: #cbd5e1;
    --text: #f1f5f9;
    --text2: #ffffff;
    --accent: #818cf8;
    --accent2: #a78bfa;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; font-size: 14px;
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--card); width: 220px;
    min-height: 100vh; position: fixed; left: 0; top: 0;
    padding: 22px 12px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .logo {
    font-size: 1.2rem; font-weight: 800; color: #fff;
    margin-bottom: 28px; padding: 4px 8px; letter-spacing: -.02em;
  }
  .logo .accent {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    color: var(--sub); text-decoration: none;
    margin-bottom: 2px; font-size: .9rem; font-weight: 500;
    transition: all .15s;
  }
  .nav-link:hover { background: var(--border); color: var(--text2); }
  .nav-link.active {
    background: rgba(129,140,248,.15);
    color: #c7d2fe; border-left: 2px solid var(--accent);
    padding-left: 10px;
  }
  .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .nav-section {
    font-size: .7rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted);
    padding: 14px 12px 6px; font-weight: 600;
  }
  .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(74,222,128,.12); border: 1px solid rgba(74,222,128,.25);
    border-radius: 20px; padding: 6px 12px;
    font-size: .78rem; color: #86efac; font-weight: 500;
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }

  /* ── Main ── */
  .main { margin-left: 220px; padding: 28px 32px; max-width: 1400px; }
  .page-header { margin-bottom: 24px; }
  .page-title { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: -.02em; }
  .page-sub { color: var(--muted); font-size: .88rem; margin-top: 4px; }

  /* ── Cards ── */
  .card-dark {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px;
  }
  .card-dark:hover { border-color: var(--border2); }

  /* ── Stat cards ── */
  .stat {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 14px; padding: 18px 20px;
    position: relative; overflow: hidden;
    transition: all .15s;
  }
  .stat:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stat-accent { height: 3px; border-radius: 3px 3px 0 0; position: absolute; top: 0; left: 0; right: 0; }
  .stat-icon { font-size: 1.5rem; margin-bottom: 10px; display: block; }
  .stat-val { font-size: 1.9rem; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -.03em; }
  .stat-lbl { color: var(--sub); font-size: .82rem; margin-top: 6px; font-weight: 500; }

  /* ── Buttons ── */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 8px; font-weight: 600;
    color: #fff !important;
    box-shadow: 0 2px 12px rgba(129,140,248,.3);
    transition: all .15s;
  }
  .btn-primary:hover {
    opacity: .92; box-shadow: 0 4px 20px rgba(129,140,248,.45);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
  }
  .btn-ghost {
    background: var(--border); border: none; border-radius: 8px;
    color: var(--sub); font-size: .85rem; font-weight: 500;
    transition: background .15s, color .15s;
  }
  .btn-ghost:hover { background: var(--border2); color: var(--text2); }

  /* ── Badges ── */
  .badge-ok   { background: rgba(74,222,128,.15); color: #86efac; border: 1px solid rgba(74,222,128,.3); padding: 3px 10px; border-radius: 20px; font-size: .76rem; font-weight: 500; white-space: nowrap; }
  .badge-warn { background: rgba(251,191,36,.15); color: #fde68a; border: 1px solid rgba(251,191,36,.3); padding: 3px 10px; border-radius: 20px; font-size: .76rem; font-weight: 500; white-space: nowrap; }
  .badge-off  { background: rgba(148,163,184,.12); color: var(--muted); border: 1px solid var(--border2); padding: 3px 10px; border-radius: 20px; font-size: .76rem; font-weight: 500; white-space: nowrap; }

  /* ── Table ── */
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  table { margin: 0; }
  table thead th {
    background: var(--card2); color: var(--sub); font-size: .75rem;
    text-transform: uppercase; letter-spacing: .06em; font-weight: 600;
    border-bottom: 1px solid var(--border); border-top: none;
    padding: 12px 14px; white-space: nowrap;
  }
  table tbody td {
    background: transparent; border-color: var(--border);
    padding: 11px 14px; vertical-align: middle;
    color: var(--sub); font-size: .9rem;
  }
  table tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  table tbody tr:last-child { border-bottom: none; }
  table tbody tr:hover td { background: rgba(255,255,255,.025); }
  .product-name { color: var(--text2) !important; font-weight: 500; }

  /* ── Rank ── */
  .rank-a { color: #86efac; font-weight: 700; background: rgba(74,222,128,.15); padding: 2px 9px; border-radius: 6px; font-size: .82rem; }
  .rank-b { color: #93c5fd; font-weight: 700; background: rgba(96,165,250,.15); padding: 2px 9px; border-radius: 6px; font-size: .82rem; }
  .rank-c { color: #fde68a; font-weight: 700; background: rgba(251,191,36,.15); padding: 2px 9px; border-radius: 6px; font-size: .82rem; }
  .rank-d { color: var(--sub); font-weight: 700; background: var(--border); padding: 2px 9px; border-radius: 6px; font-size: .82rem; }

  /* ── Alerts ── */
  .alert-row { border-left: 3px solid var(--accent); background: var(--card2); border-radius: 0 10px 10px 0; padding: 11px 16px; margin-bottom: 8px; transition: border-color .15s; }
  .alert-row.up   { border-left-color: var(--green); }
  .alert-row.down { border-left-color: var(--red); }
  .alert-row.warn { border-left-color: var(--yellow); }
  .alert-time { font-size: .78rem; color: var(--muted); }

  /* ── Tabs ── */
  .tab-link {
    color: var(--muted); text-decoration: none;
    padding: 9px 16px; display: inline-block;
    border-bottom: 2px solid transparent;
    font-size: .9rem; font-weight: 500;
    transition: all .15s;
  }
  .tab-link:hover { color: var(--text2); }
  .tab-link.active { color: #c7d2fe; border-bottom-color: var(--accent); }

  /* ── Product photo ── */
  .product-img {
    width: 44px; height: 44px; border-radius: 8px;
    object-fit: cover; background: var(--border);
    border: 1px solid var(--border2);
  }
  .product-img-placeholder {
    width: 44px; height: 44px; border-radius: 8px;
    background: var(--border2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  /* ── Forms ── */
  .form-control, input.form-control {
    background: var(--card2) !important;
    border: 1px solid var(--border2) !important;
    color: var(--text2) !important;
    border-radius: 8px;
    font-size: .9rem;
  }
  .form-control:focus {
    background: var(--card2) !important;
    border-color: var(--accent) !important;
    color: var(--text2) !important;
    box-shadow: 0 0 0 2px rgba(129,140,248,.2) !important;
  }
  .form-control::placeholder { color: var(--muted); }

  canvas { max-height: 220px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="sidebar">
  <div class="logo">FS <span class="accent">FullSell</span></div>
  <nav>
    <div class="nav-section">Навигация</div>
    <a href="/clients" class="nav-link {% if active_page=='clients' %}active{% endif %}">
      <span class="nav-icon">🏪</span> Клиенты
    </a>
    {% if client_id %}
    <a href="/shop/{{ client_id }}" class="nav-link {% if active_page=='shop' %}active{% endif %}">
      <span class="nav-icon">📦</span> Магазин
    </a>
    {% endif %}
  </nav>
  <div class="sidebar-bottom">
    <a href="/logout" class="nav-link mb-2">
      <span class="nav-icon">🚪</span> Выйти
    </a>
    <div class="status-pill">
      <span class="status-dot"></span> Система активна
    </div>
  </div>
</div>

<div class="main">
  {% block content %}{% endblock %}
</div>
</body>
</html>
