<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FullSell — Вход</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  body { background: #0f1117; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #1a1d27; border: 1px solid #252836; border-radius: 16px; padding: 40px 36px; width: 360px; }
  .logo { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .logo .accent { background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { color: #64748b; font-size: .88rem; margin-bottom: 32px; }
  label { color: #94a3b8; font-size: .85rem; margin-bottom: 6px; display: block; }
  input[type=password] { background: #252836; border: 1px solid #313449; color: #e2e8f0; border-radius: 8px; padding: 10px 14px; width: 100%; font-size: .95rem; outline: none; transition: border-color .2s; }
  input[type=password]:focus { border-color: #6366f1; }
  .btn-login { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: 8px; padding: 11px; width: 100%; color: #fff; font-weight: 600; font-size: .95rem; margin-top: 20px; cursor: pointer; transition: opacity .15s; }
  .btn-login:hover { opacity: .88; }
  .err { background: rgba(239,68,68,.12); color: #f87171; border-radius: 8px; padding: 10px 14px; font-size: .85rem; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">FS <span class="accent">FullSell</span></div>
  <div class="sub">Панель управления магазинами UZUM</div>
  {% if error %}
  <div class="err">❌ Неверный пароль</div>
  {% endif %}
  <form method="post" action="/login">
    <label>Пароль</label>
    <input type="password" name="password" placeholder="Введите пароль" autofocus>
    <button type="submit" class="btn-login">Войти →</button>
  </form>
</div>
</body>
</html>
